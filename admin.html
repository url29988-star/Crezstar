<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CREZSTAR Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-[#0A0A0F] text-white font-[Poppins] min-h-screen p-4">
  
  <!-- Login -->
  <div id="loginDiv" class="max-w-md mx-auto mt-20 p-8 bg-[#111118]/40 backdrop-blur-xl rounded-2xl border border-white/10">
    <h1 class="text-2xl font-bold mb-6 text-center">CREZSTAR Admin</h1>
    <input id="email" type="email" placeholder="Email" class="w-full mb-4 px-4 py-3 rounded-xl bg-white/5 border border-white/10">
    <input id="password" type="password" placeholder="Password" class="w-full mb-6 px-4 py-3 rounded-xl bg-white/5 border border-white/10">
    <button id="loginBtn" class="w-full bg-[#8B5CF6] py-3 rounded-xl font-semibold">Login</button>
    <p id="loginError" class="text-red-400 text-sm mt-4 text-center"></p>
  </div>

  <!-- Admin Panel -->
  <div id="adminDiv" class="hidden max-w-4xl mx-auto">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-3xl font-bold">Site Control Panel</h1>
      <button id="logoutBtn" class="text-sm text-gray-400 hover:text-purple-400">Logout</button>
    </div>

    <!-- Tabs -->
    <div class="flex gap-4 mb-8 border-b border-white/10">
      <button class="tabBtn px-4 py-2 border-b-2 border-purple-500 text-purple-400" data-tab="site">Site Content</button>
      <button class="tabBtn px-4 py-2 text-gray-400" data-tab="works">Add Creation</button>
    </div>

    <!-- Site Content Tab -->
    <div id="siteTab" class="tabContent space-y-6 bg-[#111118]/40 backdrop-blur-xl rounded-2xl border border-white/10 p-8">
      <h2 class="text-xl font-bold mb-4">Logo & Branding</h2>
      <input id="navName" type="text" placeholder="Site Name (e.g. CREZSTAR)" class="w-full mb-4 px-4 py-3 rounded-xl bg-white/5 border border-white/10">
      <input id="logoUrl" type="url" placeholder="Logo Image URL" class="w-full mb-6 px-4 py-3 rounded-xl bg-white/5 border border-white/10">
      
      <h2 class="text-xl font-bold mb-4">Hero Section</h2>
      <input id="heroName" type="text" placeholder="Hero Name" class="w-full mb-4 px-4 py-3 rounded-xl bg-white/5 border border-white/10">
      <input id="heroTitle" type="text" placeholder="Hero Title (e.g. DESIGNER. SCRIPTER. WRITER.)" class="w-full mb-4 px-4 py-3 rounded-xl bg-white/5 border border-white/10">
      <textarea id="heroDesc" placeholder="Hero Description" rows="3" class="w-full mb-4 px-4 py-3 rounded-xl bg-white/5 border border-white/10"></textarea>
      <input id="heroImageUrl" type="url" placeholder="Your Photo URL (hero image)" class="w-full mb-6 px-4 py-3 rounded-xl bg-white/5 border border-white/10">
      
      <h2 class="text-xl font-bold mb-4">About Section</h2>
      <input id="aboutTitle" type="text" placeholder="About Title" class="w-full mb-4 px-4 py-3 rounded-xl bg-white/5 border border-white/10">
      <textarea id="aboutDesc" placeholder="About Description" rows="4" class="w-full mb-6 px-4 py-3 rounded-xl bg-white/5 border border-white/10"></textarea>
      
      <h2 class="text-xl font-bold mb-4">Contact & Footer</h2>
      <input id="contactEmail" type="email" placeholder="Contact Email" class="w-full mb-4 px-4 py-3 rounded-xl bg-white/5 border border-white/10">
      <textarea id="contactDesc" placeholder="Contact Section Text" rows="2" class="w-full mb-4 px-4 py-3 rounded-xl bg-white/5 border border-white/10"></textarea>
      <input id="footerText" type="text" placeholder="Footer Text" class="w-full mb-6 px-4 py-3 rounded-xl bg-white/5 border border-white/10">
      
      <button id="saveSiteBtn" class="w-full bg-[#8B5CF6] py-3 rounded-xl font-semibold">Save Site Content</button>
      <p id="siteStatus" class="text-green-400 text-sm mt-4 text-center"></p>
    </div>

    <!-- Add Work Tab -->
    <div id="worksTab" class="tabContent hidden space-y-6 bg-[#111118]/40 backdrop-blur-xl rounded-2xl border border-white/10 p-8">
      <h2 class="text-xl font-bold mb-4">Add New Creation</h2>
      <input id="workTitle" type="text" placeholder="Title" class="w-full mb-4 px-4 py-3 rounded-xl bg-white/5 border border-white/10">
      <textarea id="workDesc" placeholder="Description" rows="3" class="w-full mb-4 px-4 py-3 rounded-xl bg-white/5 border border-white/10"></textarea>
      <input id="workImageUrl" type="url" placeholder="Image URL" class="w-full mb-4 px-4 py-3 rounded-xl bg-white/5 border border-white/10">
      <select id="workCategory" class="w-full mb-6 px-4 py-3 rounded-xl bg-white/5 border border-white/10">
        <option value="design">Design</option>
        <option value="script">Script</option>
        <option value="writing">Writing</option>
        <option value="photography">Photography</option>
      </select>
      <button id="saveWorkBtn" class="w-full bg-[#8B5CF6] py-3 rounded-xl font-semibold">Add to CREATIONS</button>
      <p id="workStatus" class="text-green-400 text-sm mt-4 text-center"></p>
    </div>
  </div>

<script type="module">
  import { db, auth } from './firebase-config.js';
  import { signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { doc, setDoc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const loginDiv = document.getElementById('loginDiv');
  const adminDiv = document.getElementById('adminDiv');
  
  // Auth
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      loginDiv.classList.add('hidden');
      adminDiv.classList.remove('hidden');
      loadCurrentContent();
    } else {
      loginDiv.classList.remove('hidden');
      adminDiv.classList.add('hidden');
    }
  });

  document.getElementById('loginBtn').onclick = async () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch (error) {
      document.getElementById('loginError').innerText = "Wrong email or password";
    }
  };

  document.getElementById('logoutBtn').onclick = () => signOut(auth);

  // Tabs
  document.querySelectorAll('.tabBtn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.tabBtn').forEach(b => b.className = 'tabBtn px-4 py-2 text-gray-400');
      btn.className = 'tabBtn px-4 py-2 border-b-2 border-purple-500 text-purple-400';
      document.querySelectorAll('.tabContent').forEach(c => c.classList.add('hidden'));
      document.getElementById(btn.dataset.tab + 'Tab').classList.remove('hidden');
    };
  });

  // Load current content into form
  async function loadCurrentContent() {
    const contentRef = doc(db, "site", "content");
    const contentSnap = await getDoc(contentRef);
    if (contentSnap.exists()) {
      const data = contentSnap.data();
      document.getElementById('navName').value = data.navName || '';
      document.getElementById('logoUrl').value = data.logoUrl || '';
      document.getElementById('heroName').value = data.heroName || '';
      document.getElementById('heroTitle').value = data.heroTitle || '';
      document.getElementById('heroDesc').value = data.heroDesc || '';
      document.getElementById('heroImageUrl').value = data.heroImageUrl || '';
      document.getElementById('aboutTitle').value = data.aboutTitle || '';
      document.getElementById('aboutDesc').value = data.aboutDesc || '';
      document.getElementById('contactEmail').value = data.contactEmail || '';
      document.getElementById('contactDesc').value = data.contactDesc || '';
      document.getElementById('footerText').value = data.footerText || '';
    }
  }

  // Save site content
  document.getElementById('saveSiteBtn').onclick = async () => {
    const data = {
      navName: document.getElementById('navName').value,
      logoUrl: document.getElementById('logoUrl').value,
      heroName: document.getElementById('heroName').value,
      heroTitle: document.getElementById('heroTitle').value,
      heroDesc: document.getElementById('heroDesc').value,
      heroImageUrl: document.getElementById('heroImageUrl').value,
      aboutTitle: document.getElementById('aboutTitle').value,
      aboutDesc: document.getElementById('aboutDesc').value,
      contactEmail: document.getElementById('contactEmail').value,
      contactDesc: document.getElementById('contactDesc').value,
      footerText: document.getElementById('footerText').value,
    };
    try {
      await setDoc(doc(db, "site", "content"), data);
      document.getElementById('siteStatus').innerText = "Saved! Refresh your live site.";
    } catch (error) {
      document.getElementById('siteStatus').innerText = "Error: " + error.message;
    }
  };

  // Add work
  document.getElementById('saveWorkBtn').onclick = async () => {
    const work = {
      title: document.getElementById('workTitle').value,
      description: document.getElementById('workDesc').value,
      imageUrl: document.getElementById('workImageUrl').value,
      category: document.getElementById('workCategory').value,
      createdAt: serverTimestamp()
    };
    try {
      await addDoc(collection(db, "works"), work);
      document.getElementById('workStatus').innerText = "Added!";
      document.getElementById('workTitle').value = '';
      document.getElementById('workDesc').value = '';
      document.getElementById('workImageUrl').value = '';
    } catch (error) {
      document.getElementById('workStatus').innerText = "Error: " + error.message;
    }
  };
</script>
</body>
</html>
